<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Kampar - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <section id="home-view" class="view active">
            <header class="main-header">
                <h1>Welcome to Kampar, Perak!</h1>
                <p>Swipe to explore tourism spot</p>
            </header>

            <div class="carousel">
                <div class="card" style="background-image: url('assets/places/utar_grand_hall.jpg');">
                    <div class="glass-panel card-content">
                        <h3>UTAR Grand Hall</h3>
                        <button class="btn primary-btn" onclick="window.location.href='places/utar_grand_hall.html'">Explore</button>
                    </div>
                </div>

                <div class="card" style="background-image: url('assets/places/kampar_seng_fatt_temple.jpg');">
                    <div class="glass-panel card-content">
                        <h3>Kampar Seng Fatt Temple</h3>
                        <button class="btn primary-btn" onclick="window.location.href='places/kampar_seng_fatt_temple.html'">Explore</button>
                    </div>
                </div>

                <div class="card" style="background-image: url('assets/places/kampar_lu_ban_temple.jpg');">
                    <div class="glass-panel card-content">
                        <h3>Kampar Lu Ban Temple</h3>
                        <button class="btn primary-btn" onclick="window.location.href='places/kampar_lu_ban_temple.html'">Explore</button>
                    </div>
                </div>

                <div class="card" style="background-image: url('assets/places/kampar_temple.jpg');">
                    <div class="glass-panel card-content">
                        <h3>Kampar Chinese Temple</h3>
                        <button class="btn primary-btn" onclick="window.location.href='places/kampar_chinese_temple.html'">Explore</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

</body>
</html>
